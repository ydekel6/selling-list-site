<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>מכירת תכולה</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #f2ede4;
      color: #2c2c2c;
      direction: rtl;
    }

    /* ── Header ── */
    header {
      text-align: center;
      padding: 48px 24px 32px;
    }
    header h1 {
      font-size: 2.8rem;
      font-weight: 800;
      letter-spacing: -0.5px;
      color: #1e1e1e;
    }
    header p.subtitle {
      margin-top: 8px;
      font-size: 1rem;
      color: #777;
    }

    /* ── Filter pills ── */
    .filters {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
      padding: 0 24px 36px;
    }
    .filter-btn {
      padding: 8px 20px;
      border-radius: 999px;
      border: 1.5px solid #ccc;
      background: #fff;
      font-size: 0.9rem;
      font-family: inherit;
      cursor: pointer;
      color: #444;
      transition: all 0.15s ease;
    }
    .filter-btn:hover { border-color: #6b4f2e; color: #6b4f2e; }
    .filter-btn.active {
      background: #2c2c2c;
      border-color: #2c2c2c;
      color: #fff;
    }

    /* ── Grid ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 24px;
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 24px 60px;
    }

    /* ── Card ── */
    .card {
      background: #fff;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.07);
      display: flex;
      flex-direction: column;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }
    .card:hover {
      transform: translateY(-3px);
      box-shadow: 0 6px 20px rgba(0,0,0,0.12);
    }

    /* Image area */
    .card-image {
      position: relative;
      width: 100%;
      aspect-ratio: 4/3;
      background: #e8e3da;
      overflow: hidden;
    }
    .card-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .img-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      color: #b0a89a;
    }
    .img-placeholder svg { width: 48px; height: 48px; opacity: 0.5; }
    .img-placeholder span { font-size: 0.8rem; }

    /* Discount badge */
    .badge-discount {
      position: absolute;
      top: 12px;
      left: 12px;
      background: #7a5230;
      color: #fff;
      border-radius: 8px;
      padding: 6px 10px;
      font-size: 0.78rem;
      font-weight: 700;
      line-height: 1.3;
      text-align: center;
    }
    .badge-discount .pct { font-size: 1rem; }

    /* Card body */
    .card-body {
      padding: 16px 18px 20px;
      display: flex;
      flex-direction: column;
      flex: 1;
    }

    /* Tags row */
    .tags {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }
    .tag {
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: 3px 8px;
      border-radius: 4px;
      background: #f0ece5;
      color: #6b4f2e;
    }

    .card-name {
      font-size: 1.05rem;
      font-weight: 700;
      margin-bottom: 6px;
      line-height: 1.3;
    }

    .card-meta {
      font-size: 0.82rem;
      color: #888;
      margin-bottom: 12px;
      line-height: 1.5;
    }

    /* Price row */
    .price-row {
      display: flex;
      align-items: baseline;
      gap: 10px;
      margin-top: auto;
      margin-bottom: 14px;
    }
    .price-sell {
      font-size: 1.5rem;
      font-weight: 800;
      color: #1e1e1e;
    }
    .price-sell::before { content: '₪'; font-size: 1rem; margin-left: 2px; }
    .price-original {
      font-size: 0.9rem;
      color: #aaa;
      text-decoration: line-through;
    }
    .price-original::before { content: '₪'; }

    /* Buttons */
    .btn-row {
      display: flex;
      gap: 10px;
    }
    .btn-interested {
      flex: 1;
      padding: 11px;
      background: #7a5230;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 0.95rem;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-interested:hover { background: #5e3d22; }
    .btn-original {
      padding: 11px 14px;
      background: transparent;
      color: #2c2c2c;
      border: 1.5px solid #ccc;
      border-radius: 10px;
      font-size: 0.9rem;
      font-family: inherit;
      cursor: pointer;
      white-space: nowrap;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 4px;
      transition: border-color 0.15s;
    }
    .btn-original:hover { border-color: #7a5230; color: #7a5230; }

    /* ── Modal ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: #fff;
      border-radius: 20px;
      padding: 32px 28px;
      max-width: 420px;
      width: 100%;
      position: relative;
      animation: slideUp 0.2s ease;
    }
    @keyframes slideUp {
      from { transform: translateY(20px); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }
    .modal-close {
      position: absolute;
      top: 14px;
      left: 14px;
      width: 30px; height: 30px;
      border-radius: 50%;
      border: 1.5px solid #ccc;
      background: #fff;
      font-size: 1rem;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }
    .modal-label {
      font-size: 0.75rem;
      color: #999;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }
    .modal-item-name {
      font-size: 1.3rem;
      font-weight: 800;
      margin-bottom: 4px;
    }
    .modal-item-price {
      font-size: 0.95rem;
      color: #7a5230;
      font-weight: 600;
      margin-bottom: 24px;
    }
    .modal-wa-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 14px;
      background: #25D366;
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.15s;
    }
    .modal-wa-btn:hover { background: #1da851; }
    .modal-wa-icon { width: 22px; height: 22px; fill: #fff; }
    .modal-note {
      margin-top: 12px;
      font-size: 0.8rem;
      color: #aaa;
      text-align: center;
    }

    /* ── Responsive ── */
    @media (max-width: 600px) {
      header h1 { font-size: 2rem; }
      .grid { grid-template-columns: 1fr; padding: 0 16px 48px; }
    }
  </style>
</head>

  let activeCategory = 'הכל';
  let modalItem = null;

  function discountPct(sell, original) {
    if (!original) return null;
    return Math.round((1 - sell / original) * 100);
  }

  function savedAmount(sell, original) {
    if (!original) return null;
    return (original - sell).toLocaleString('he-IL');
  }

  function placeholderSVG() {
    return `<div class="img-placeholder">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/>
        <circle cx="12" cy="13" r="4"/>
      </svg>
      <span>תמונה בקרוב</span>
    </div>`;
  }

  function renderCard(item) {
    const pct = discountPct(item.sellPrice, item.originalPrice);
    const saved = savedAmount(item.sellPrice, item.originalPrice);
    const hasImage = item.images && item.images.length > 0;

    const badgeHTML = pct ? `
      <div class="badge-discount">
        <div class="pct">${pct}% הנחה</div>
        <div>חיסכון ₪${saved}</div>
      </div>` : '';

    const imageHTML = hasImage
      ? `<img src="${item.images[0]}" alt="${item.name}" loading="lazy" />`
      : placeholderSVG();

    const metaParts = [];
    if (item.age) metaParts.push(`ותק: ${item.age}`);
    if (item.warranty === 'לבדיקה') metaParts.push('אחריות: לבדיקה');
    if (item.currentPrice) metaParts.push(`מחיר נוכחי בחנות: ₪${item.currentPrice.toLocaleString('he-IL')}`);

    const originalBtn = item.originalLink
      ? `<a href="${item.originalLink}" target="_blank" rel="noopener" class="btn-original">מקור ↗</a>`
      : '';

    return `
      <div class="card" data-category="${item.category}">
        <div class="card-image">
          ${imageHTML}
          ${badgeHTML}
        </div>
        <div class="card-body">
          <div class="tags">
            <span class="tag">${item.category}</span>
          </div>
          <h2 class="card-name">${item.name}</h2>
          ${metaParts.length ? `<p class="card-meta">${metaParts.join(' · ')}</p>` : '<p class="card-meta">&nbsp;</p>'}
          <div class="price-row">
            <span class="price-sell">${item.sellPrice.toLocaleString('he-IL')}</span>
            ${item.originalPrice ? `<span class="price-original">${item.originalPrice.toLocaleString('he-IL')}</span>` : ''}
          </div>
          <div class="btn-row">
            <button class="btn-interested" onclick="openModal(${items.indexOf(item)})">מעוניין/ת</button>
            ${originalBtn}
          </div>
        </div>
      </div>`;
  }

  function renderFilters() {
    const filtersEl = document.getElementById('filters');
    filtersEl.innerHTML = CATEGORIES.map(cat => `
      <button class="filter-btn ${cat === activeCategory ? 'active' : ''}" onclick="setCategory('${cat}')">${cat}</button>
    `).join('');
  }

  function renderGrid() {
    const gridEl = document.getElementById('grid');
    const filtered = activeCategory === 'הכל'
      ? items
      : items.filter(i => i.category === activeCategory);
    gridEl.innerHTML = filtered.map(renderCard).join('');
  }

  function setCategory(cat) {
    activeCategory = cat;
    renderFilters();
    renderGrid();
  }

  function openModal(idx) {
    modalItem = items[idx];
    const pct = discountPct(modalItem.sellPrice, modalItem.originalPrice);
    document.getElementById('modal-name').textContent = modalItem.name;
    document.getElementById('modal-price').textContent =
      `₪${modalItem.sellPrice.toLocaleString('he-IL')}` +
      (pct ? ` · ${pct}% הנחה` : '') +
      (modalItem.originalPrice ? ` מתוך ₪${modalItem.originalPrice.toLocaleString('he-IL')}` : '');

    const msg = encodeURIComponent(`היי, אני מעוניין/ת ב${modalItem.name} 😊`);
    document.getElementById('modal-wa-link').href = `https://wa.me/${WHATSAPP}?text=${msg}`;
    document.getElementById('modal').classList.add('open');
  }

  function closeModal(e) {
    if (!e || e.target === document.getElementById('modal')) {
      document.getElementById('modal').classList.remove('open');
    }
  }

  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

  renderFilters();
  renderGrid();
</script>
